<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AuraFinance | AI Personal Finance Dashboard{% endblock %}</title>
    
    <!-- Meta tags for SEO -->
    <meta name="description" content="Manage your personal finance, analyze monthly income and expenses with premium Chart.js analytics, and generate smart AI financial insights.">
    <meta name="author" content="CSE Student Project">
    
    <!-- Google Fonts - Plus Jakarta Sans & Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <!-- FontAwesome 6 Icons CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Custom Premium CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background Blur Decorative Gradients -->
    <div class="glow-bg-1"></div>
    <div class="glow-bg-2"></div>

    <!-- Modern Glassmorphic Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark main-navbar py-3 sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <div class="brand-logo me-2">
                    <i class="fa-solid fa-wallet text-gradient-accent"></i>
                </div>
                <span class="brand-name font-space-grotesk">Aura<span class="text-accent">Finance</span></span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-2 mt-3 mt-lg-0">
                    <li class="nav-item">
                        <a id="nav-dashboard" class="nav-link px-3 py-2 rounded-pill {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="fa-solid fa-chart-pie me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a id="nav-transactions" class="nav-link px-3 py-2 rounded-pill {% if request.path == '/transactions' %}active{% endif %}" href="/transactions">
                            <i class="fa-solid fa-list-check me-1"></i> Transactions
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <a href="/transactions" class="btn btn-premium px-4 py-2 rounded-pill shadow-sm" id="btn-quick-add">
                            <i class="fa-solid fa-plus-circle me-1"></i> Quick Add
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container my-5 content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-1 text-secondary-custom font-space-grotesk">
                AuraFinance &copy; 2026 - Designed for 3rd Year CSE Web Development Coursework
            </p>
            <p class="footer-subtext text-muted mb-0">
                Powered by Flask, SQLite, and OpenAI API / Local Rule Heuristics
            </p>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Project JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
